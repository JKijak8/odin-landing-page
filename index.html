<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Odin Landing Page</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">Header Logo</div>
      <ul class="header-links">
        <li><a>header link one</a></li>
        <li><a>header link two</a></li>
        <li><a>header link three</a></li>
      </ul>
    </header>

    <div class="hero">
      <div class="hero-text">
        <h1 class="hero-primary">This website is awesome</h1>
        <p class="hero-secondary">
          This website has some subtext that goes here under the main title.
          It's a smaller font and the color is lower contrast.
        </p>
        <button class="button">Sign up</button>
      </div>
      <img class="photo" src="./images/donkey.jpg" alt="Donkey photo" />
    </div>

    <h2 class="cards-title">Some random information.</h2>
    <div class="cards">
      <div class="card">
        <img src="./images/fireworks.jpg" alt="fireworks" />
        <div class="text">Some fireworks.</div>
      </div>
      <div class="card">
        <img src="./images/circles.jpg" alt="circles" />
        <div class="text">Circles I guess.</div>
      </div>
      <div class="card">
        <img src="./images/house.jpg" alt="house" />
        <div class="text">A house.</div>
      </div>
      <div class="card">
        <img src="./images/seagull.jpg" alt="seagull" />
        <div class="text">A seagull.</div>
      </div>
    </div>
  </body>
</html>
